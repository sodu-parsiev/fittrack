name: fittrack-prod

services:
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/app/database/database.sqlite
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - fittrack_storage:/var/www/html/storage
    networks:
      - fittrack

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - fittrack_storage:/var/www/html/storage:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fittrack

networks:
  fittrack:
    driver: bridge

volumes:
  fittrack_storage:
