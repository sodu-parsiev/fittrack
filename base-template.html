<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Counter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #111;
      color: #fff;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    input, button {
      font-size: 16px;
      border: none;
      border-radius: 10px;
      padding: 12px;
      margin: 6px 0;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      background: #2b2b2b;
      color: #fff;
    }

    button {
      cursor: pointer;
      width: 100%;
      background: #2f7cff;
      color: white;
      font-weight: bold;
    }

    button.secondary {
      background: #333;
    }

    button.danger {
      background: #c0392b;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > * {
      flex: 1;
    }

    .exercise {
      padding: 14px;
      border-radius: 12px;
      background: #262626;
      margin-top: 12px;
    }

    .small {
      font-size: 14px;
      color: #bbb;
    }

    .big-number {
      font-size: 42px;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }

    .set-list {
      margin-top: 10px;
      padding-left: 18px;
    }

    .set-list li {
      margin-bottom: 4px;
    }

    .muted {
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gym Counter</h1>

    <div class="card">
      <h2>Add exercise</h2>
      <input id="exerciseName" type="text" placeholder="Exercise name, e.g. Smith bench" />
      <div class="row">
        <input id="exerciseWeight" type="number" placeholder="Weight kg" />
        <input id="exerciseReps" type="number" placeholder="Target reps" />
      </div>
      <button onclick="addExercise()">Add exercise</button>
    </div>

    <div class="card">
      <h2>Rest timer</h2>
      <div class="row">
        <input id="restSeconds" type="number" value="60" min="1" />
        <button onclick="startTimer()">Start timer</button>
      </div>
      <div class="big-number" id="timerDisplay">60</div>
      <div class="row">
        <button class="secondary" onclick="pauseTimer()">Pause</button>
        <button class="danger" onclick="resetTimer()">Reset</button>
      </div>
    </div>

    <div class="card">
      <h2>Exercises</h2>
      <div id="exerciseList"></div>
    </div>
  </div>

  <script>
    let exercises = JSON.parse(localStorage.getItem("gymExercises") || "[]");
    let timer = null;
    let timeLeft = 60;

    function saveData() {
      localStorage.setItem("gymExercises", JSON.stringify(exercises));
    }

    function renderExercises() {
      const list = document.getElementById("exerciseList");
      list.innerHTML = "";

      if (exercises.length === 0) {
        list.innerHTML = '<p class="muted">No exercises yet.</p>';
        return;
      }

      exercises.forEach((exercise, index) => {
        const div = document.createElement("div");
        div.className = "exercise";

        const setItems = exercise.sets.map((set, i) => {
          return `<li>Set ${i + 1}: ${set.reps} reps x ${set.weight} kg</li>`;
        }).join("");

        div.innerHTML = `
          <h3>${exercise.name}</h3>
          <p class="small">Current weight: <strong>${exercise.weight} kg</strong></p>
          <p class="small">Target reps: <strong>${exercise.targetReps}</strong></p>
          <p class="small">Completed sets: <strong>${exercise.sets.length}</strong></p>

          <div class="row">
            <input type="number" id="reps-${index}" placeholder="Reps done" value="${exercise.targetReps}">
            <input type="number" id="weight-${index}" placeholder="Weight" value="${exercise.weight}">
          </div>

          <button onclick="completeSet(${index})">Complete set</button>
          <div class="row">
            <button class="secondary" onclick="increaseWeight(${index})">+2.5 kg</button>
            <button class="secondary" onclick="decreaseWeight(${index})">-2.5 kg</button>
          </div>
          <button class="danger" onclick="removeExercise(${index})">Delete exercise</button>

          ${exercise.sets.length ? `<ul class="set-list">${setItems}</ul>` : '<p class="muted">No sets completed yet.</p>'}
        `;

        list.appendChild(div);
      });
    }

    function addExercise() {
      const name = document.getElementById("exerciseName").value.trim();
      const weight = parseFloat(document.getElementById("exerciseWeight").value) || 0;
      const reps = parseInt(document.getElementById("exerciseReps").value) || 0;

      if (!name) {
        alert("Enter exercise name");
        return;
      }

      exercises.push({
        name,
        weight,
        targetReps: reps,
        sets: []
      });

      saveData();
      renderExercises();

      document.getElementById("exerciseName").value = "";
      document.getElementById("exerciseWeight").value = "";
      document.getElementById("exerciseReps").value = "";
    }

    function completeSet(index) {
      const repsInput = document.getElementById(`reps-${index}`);
      const weightInput = document.getElementById(`weight-${index}`);

      const reps = parseInt(repsInput.value) || 0;
      const weight = parseFloat(weightInput.value) || 0;

      exercises[index].weight = weight;
      exercises[index].sets.push({ reps, weight });

      saveData();
      renderExercises();
      startTimer();
    }

    function increaseWeight(index) {
      exercises[index].weight = +(exercises[index].weight + 2.5).toFixed(2);
      saveData();
      renderExercises();
    }

    function decreaseWeight(index) {
      exercises[index].weight = Math.max(0, +(exercises[index].weight - 2.5).toFixed(2));
      saveData();
      renderExercises();
    }

    function removeExercise(index) {
      exercises.splice(index, 1);
      saveData();
      renderExercises();
    }

    function startTimer() {
      clearInterval(timer);
      const inputSeconds = parseInt(document.getElementById("restSeconds").value) || 60;
      timeLeft = inputSeconds;
      document.getElementById("timerDisplay").textContent = timeLeft;

      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timerDisplay").textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          document.getElementById("timerDisplay").textContent = "Done";
          try {
            const audio = new Audio("data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");
            audio.play();
          } catch (e) {}
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
    }

    function resetTimer() {
      clearInterval(timer);
      timeLeft = parseInt(document.getElementById("restSeconds").value) || 60;
      document.getElementById("timerDisplay").textContent = timeLeft;
    }

    resetTimer();
    renderExercises();
  </script>
</body>
</html>
